function fmtDate(iso){
  const d=new Date(iso);
  if(isNaN(d))return iso;
  const jst=new Date(d.getTime()+9*60*60*1000);
  const Y=jst.getUTCFullYear();
  const M=jst.getUTCMonth()+1;
  const D=jst.getUTCDate();
  const h=jst.getUTCHours();
  const m=String(jst.getUTCMinutes()).padStart(2,'0');
  if(iso.length>10){return `${Y}年${M}月${D}日 ${h}:${m}`;}
  return `${Y}年${M}月${D}日`;
}

/* ══ EmailJS メール送信 ══ */
async function sendNotificationEmail(emailCfg, post){
  if(!emailCfg || !emailCfg.serviceId || !emailCfg.templateId || !emailCfg.publicKey || !emailCfg.adminEmail){
    console.log("メール設定未完了のため通知スキップ");
    return false;
  }
  try{
    emailjs.init(emailCfg.publicKey);
    const params={
      to_email: emailCfg.adminEmail,
      author:   post.author,
      category: post.category,
      message:  post.message,
      date:     fmtDate(post.date),
      site_url: window.location.href
    };
    await emailjs.send(emailCfg.serviceId, emailCfg.templateId, params);
    console.log("📧 通知メール送信成功");
    return true;
  }catch(e){
    console.error("📧 通知メール送信失敗:", e);
    return false;
  }
}

            const updated={...p,likes:0,likedBy:{},bookmarks:0,_likesReset:true};
            db.ref("posts").child(p.id).update({likes:0,likedBy:null,bookmarks:0,_likesReset:true});
            return updated;
          }return p;
        });
        arr.sort((a,b)=>b.ts-a.ts);
        if(arr.length>prevCountRef.current&&view!=="feed")setNewBadge(true);
        prevCountRef.current=arr.length;
        setPosts(arr);setLoading(false);
      });
    }else{
      const stored=lsGet("yosyuku_v4_local");
      const arr=stored||SEEDS;
      if(!stored)lsSet("yosyuku_v4_local",arr);
      setPosts(arr);prevCountRef.current=arr.length;setLoading(false);
    }
    return()=>{if(unsubRef.current&&db)db.ref("posts").off("value",unsubRef.current);};
  },[]);

      else{setView("onboard");}

    return()=>clearTimeout(t);
  },[]);

  const finishOnboard=()=>{

    lsSet(KEY_USER,u);setUser(u);
    setForm(p=>({...p,author:u.name,flower:u.avatar}));

  const handleImgUpload=(e,target)=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      const img=new Image();
      img.onload=()=>{
        const SIZE=200,ratio=Math.min(SIZE/img.width,SIZE/img.height);
        const canvas=document.createElement("canvas");
        canvas.width=img.width*ratio;canvas.height=img.height*ratio;
        canvas.getContext("2d").drawImage(img,0,0,canvas.width,canvas.height);
        const compressed=canvas.toDataURL("image/jpeg",0.72);
        if(target==="onboard"){setOnboard(p=>({...p,avatarImg:compressed}));}
        else if(target==="profile"&&user){
          const u={...user,avatarImg:compressed};
          try{lsSet(KEY_USER,u);setUser(u);showToast("アイコン画像を保存しました！📷");}
          catch(err){showToast("画像が大きすぎます。別の画像をお試しください","err");}
        }
      };img.src=ev.target.result;
    };reader.readAsDataURL(file);
  };

  const writePost=async(np)=>{
    if(firebaseReady&&db){await db.ref("posts").child(np.id).set(np);}
    else{const arr=[np,...posts];lsSet("yosyuku_v4_local",arr);setPosts(arr);}
  };
  const updatePost=async(id,data)=>{
    if(firebaseReady&&db){await db.ref("posts").child(id).update(data);}
    else{const arr=posts.map(p=>p.id===id?{...p,...data}:p);lsSet("yosyuku_v4_local",arr);setPosts(arr);}
  };
  const removePost=async(id)=>{
    if(firebaseReady&&db){await db.ref("posts").child(id).remove();}
    else{const arr=posts.filter(p=>p.id!==id);lsSet("yosyuku_v4_local",arr);setPosts(arr);}
  };

  const handleLike=async(id)=>{
    if(!user){showToast("参加登録が必要です","err");return;}
    const post=posts.find(p=>p.id===id);if(!post)return;
    const was=liked.has(id);
    const newLikes=was?Math.max(0,post.likes-1):post.likes+1;
    const ns=new Set(liked);was?ns.delete(id):ns.add(id);
    setLiked(ns);lsSet(KEY_LIKED,[...ns]);
    setPosts(prev=>prev.map(p=>p.id===id?{...p,likes:newLikes}:p));
    if(selected?.id===id)setSelected(prev=>({...prev,likes:newLikes}));
    if(firebaseReady&&db){
      try{
        const rawName=(user?.name||"匿名").trim();
        const safeName=rawName.replace(/[.#$[\]/\s]/g,"_")||"user";
        const updates={};
        updates["posts/"+id+"/likes"]=newLikes;
        if(was){updates["posts/"+id+"/likedBy/"+safeName]=null;}
        else{updates["posts/"+id+"/likedBy/"+safeName]=rawName;}
        await db.ref().update(updates);
      }catch(e){
        console.error("Like save error:",e);
        const rb=new Set(liked);was?rb.add(id):rb.delete(id);
        setLiked(rb);lsSet(KEY_LIKED,[...rb]);
        setPosts(prev=>prev.map(p=>p.id===id?{...p,likes:post.likes}:p));
        return;
      }
    }
    showToast(was?"💔 共感を取り消しました":"🩷 共感しました！");
  };

  const handleBookmark=async(id)=>{
    if(!user){showToast("参加登録が必要です","err");return;}
    const post=posts.find(p=>p.id===id);if(!post)return;
    const was=bookmarks.has(id);
    const newBk=Math.max(0,(post.bookmarks||0)+(was?-1:1));
    const ns=new Set(bookmarks);was?ns.delete(id):ns.add(id);
    setBookmarks(ns);lsSet(KEY_BM,[...ns]);
    if(!firebaseReady)setPosts(prev=>prev.map(p=>p.id===id?{...p,bookmarks:newBk}:p));
    if(selected?.id===id)setSelected(prev=>({...prev,bookmarks:newBk}));
    await updatePost(id,{bookmarks:newBk});
    showToast(was?"ブックマークを解除しました":"ブックマークしました📌");
  };

  const handleEditStart=(post)=>{setEditTarget(post);setEditForm({message:post.message,category:post.category,flower:post.flower});};

    await updatePost(editTarget.id,{message:editForm.message.trim(),category:editForm.category,flower:editForm.flower});
    setEditTarget(null);showToast("✏️ 予祝を更新しました！");

  };

  const handleReplySubmit=async()=>{
    if(!user){showToast("参加登録が必要です","err");return;}
    if(!replyText.trim()&&!replyImage)return;
    if(replyText.trim().length>0&&replyText.trim().length<2)return;

    try{
      if(firebaseReady&&db){
        await db.ref("replies/"+targetPost.id+"/"+nr.id).set(nr);

  };

            {user&&<div onClick={()=>setView("mypage")} style={{display:"flex",alignItems:"center",gap:6,padding:"5px 10px",borderRadius:50,border:"1.5px solid rgba(232,180,196,.4)",background:"#fff",cursor:"pointer"}}>
              <Avatar src={user.avatarImg} emoji={user.avatar} size={24}/>
              <span style={{fontSize:13,color:"#9a5070",fontFamily:"'Noto Serif JP',serif",maxWidth:70,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{user.name}</span>
            </div>}
            <div style={{position:"relative"}}>
              <button className="btn-p" onClick={()=>setView("write")} style={{padding:"9px 18px",fontSize:14}}>✨ 予祝を書く</button>
              {newBadge&&<div style={{position:"absolute",top:-4,right:-4,width:10,height:10,borderRadius:"50%",background:"#ff6b6b",animation:"pulse 1s ease infinite"}}/>}
            </div>
          </div>
        </div>
      </header>

      {toast&&<div style={{position:"fixed",top:76,left:"50%",transform:"translateX(-50%)",background:toast.type==="err"?"linear-gradient(135deg,#e87272,#c85a5a)":toast.type==="info"?"linear-gradient(135deg,#6ec87a,#4aaa5e)":"linear-gradient(135deg,#e8728a,#c85a8e)",color:"#fff",padding:"13px 28px",borderRadius:50,fontSize:14,zIndex:9999,boxShadow:"0 8px 32px rgba(200,90,142,.4)",animation:"popIn .3s ease",fontFamily:"'Noto Serif JP',serif",letterSpacing:".04em",maxWidth:"92vw",textAlign:"center",whiteSpace:"nowrap"}}>{toast.msg}</div>}

      <main style={{maxWidth:680,margin:"0 auto",padding:"22px 14px 110px",position:"relative",zIndex:1}}>

        {/* FEED */}
        {view==="feed"&&<div style={{animation:"fadeUp .4s ease"}}>
          <div style={{textAlign:"center",marginBottom:26,padding:"24px 16px 20px",background:"rgba(255,255,255,.72)",borderRadius:22,border:"1px solid rgba(232,180,196,.22)",backdropFilter:"blur(10px)"}}>
            <div style={{fontFamily:"'Shippori Mincho',serif",fontWeight:700,fontSize:11,color:"#c06080",letterSpacing:".3em",marginBottom:10}}>YOSYUKU COMMUNITY</div>
            <h1 style={{fontFamily:"'Shippori Mincho',serif",fontWeight:800,fontSize:24,color:"#6b1a3a",lineHeight:1.5,margin:"0 0 10px"}}>なりたい未来を<br/>先に喜んでしまおう</h1>
            <p style={{fontSize:13,color:"#9a5070",lineHeight:1.85,margin:"0 0 18px",fontFamily:"'Noto Serif JP',serif"}}>仲間の予祝を読んで、あなたの夢も引き寄せましょう 🌸</p>
            <div style={{display:"flex",justifyContent:"center",gap:28}}>
              {[{label:"投稿数",val:posts.length,icon:"📝"},{label:"共感の数",val:totalLikes,icon:"🩷"}].map(s=><div key={s.label} style={{textAlign:"center"}}><div style={{fontFamily:"'Shippori Mincho',serif",fontWeight:800,fontSize:19,color:"#c85a8e"}}>{s.icon} {s.val}</div><div style={{fontSize:10,color:"#b08090",letterSpacing:".08em",fontFamily:"'Noto Serif JP',serif",marginTop:2}}>{s.label}</div></div>)}
            </div>
          </div>
          <div style={{marginBottom:16}}>
            <div className="no-scrollbar" style={{display:"flex",gap:6,overflowX:"auto",paddingBottom:6,marginBottom:8}}>
              {["すべて",...categories].map(c=><button key={c} className={`chip ${filter===c?"chip-on":"chip-off"}`} onClick={()=>setFilter(c)} style={{padding:"7px 14px",fontSize:12}}>{c}</button>)}
            </div>
            <div style={{display:"flex",justifyContent:"flex-end",gap:6}}>
              {[["new","🕐 新着"],["hot","🔥 人気"]].map(([v,l])=><button key={v} className={`chip ${sort===v?"chip-on":"chip-off"}`} onClick={()=>setSort(v)} style={{padding:"5px 13px",fontSize:12}}>{l}</button>)}
            </div>
          </div>
          {loading?<div style={{textAlign:"center",padding:"60px 0",color:"#c06080"}}><div style={{fontSize:36,animation:"spin 1s linear infinite",display:"inline-block"}}>🌸</div><div style={{marginTop:12,fontFamily:"'Noto Serif JP',serif",fontSize:14}}>読み込み中…</div></div>
          :<div style={{display:"flex",flexDirection:"column",gap:12}}>
            {displayed.length===0?<EmptyState onWrite={()=>setView("write")}/>
            :displayed.map((p,i)=><PostCard key={p.id} post={p} index={i} liked={liked.has(p.id)} bookmarked={bookmarks.has(p.id)} onOpen={()=>{setSelected(p);setView("detail");setReplies([]);loadReplies(p);}} onLike={()=>handleLike(p.id)} onBookmark={()=>handleBookmark(p.id)} isOwner={user?.name===p.author} onEdit={handleEditStart} onDelete={setDeleteTarget} onShowLikers={openLikers} onComment={(post)=>{setSelected(post);setView("detail");setReplies([]);loadReplies(post);}}/>)}
          </div>}
        </div>}

        {/* DETAIL */}
        {view==="detail"&&selected&&<div style={{animation:"fadeUp .35s ease"}}>
          <button className="btn-s" onClick={()=>setView("feed")} style={{marginBottom:20,padding:"10px 22px",fontSize:14}}>← 一覧に戻る</button>
          <div style={{background:"#fff",borderRadius:24,padding:"34px 24px",boxShadow:"0 8px 44px rgba(200,100,140,.13)",border:"1px solid rgba(232,180,196,.35)",position:"relative",overflow:"hidden"}}>
            <div style={{position:"absolute",top:-28,right:-28,fontSize:140,opacity:.04,pointerEvents:"none"}}>{selected.flower}</div>
            <div style={{textAlign:"center",marginBottom:24}}>
              <Avatar src={selected.avatarImg} emoji={selected.avatar||selected.flower} size={64}/>
              <div style={{marginTop:12,fontFamily:"'Shippori Mincho',serif",fontWeight:800,fontSize:20,color:"#6b1a3a"}}>{selected.author}</div>
              <div style={{fontSize:12,color:"#b08090",marginTop:4,fontFamily:"'Noto Serif JP',serif"}}>{fmtDate(selected.date)}</div>
              <span style={{marginTop:10,display:"inline-block",background:"linear-gradient(135deg,#fce4ec,#f8bbd9)",color:"#ad4775",fontSize:12,padding:"4px 14px",borderRadius:20,fontFamily:"'Noto Serif JP',serif"}}>{selected.category}</span>
            </div>
            <div style={{borderTop:"1px dashed #f0c8d8",borderBottom:"1px dashed #f0c8d8",padding:"26px 8px",margin:"0 0 22px"}}>
              <p style={{fontSize:16,color:"#3a1520",lineHeight:2.1,margin:0,fontFamily:"'Noto Serif JP',serif",textAlign:"left",whiteSpace:"pre-wrap",wordBreak:"break-word"}}>{selected.message}</p>
            </div>
            <div style={{display:"flex",justifyContent:"center",gap:12,marginBottom:18,flexWrap:"wrap"}}>
              <button onClick={()=>handleLike(selected.id)} style={{background:liked.has(selected.id)?"linear-gradient(135deg,#e8728a,#c85a8e)":"#fff",border:liked.has(selected.id)?"none":"2px solid #e8b4c4",borderRadius:50,padding:"12px 22px",fontSize:15,cursor:"pointer",color:liked.has(selected.id)?"#fff":"#c05070",display:"inline-flex",alignItems:"center",gap:7,fontFamily:"'Noto Serif JP',serif",transition:"all .2s"}}>{liked.has(selected.id)?"🩷 共感しました":"🤍 共感する"} {selected.likes}</button>
              <button onClick={()=>openLikers(selected)} style={{background:"#fff",border:"2px solid #e8b4c4",borderRadius:50,padding:"12px 16px",fontSize:14,cursor:"pointer",color:"#c05070",fontFamily:"'Noto Serif JP',serif"}}>👥 共感した人</button>
              <button onClick={()=>handleBookmark(selected.id)} style={{background:bookmarks.has(selected.id)?"#fce4ec":"#fff",border:"2px solid #e8b4c4",borderRadius:50,padding:"12px 16px",fontSize:15,cursor:"pointer",color:"#c05070"}}>{bookmarks.has(selected.id)?"📌":"🔖"}</button>
            </div>
            <div style={{borderTop:"1px solid #f0d8e0",paddingTop:18,marginTop:6}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
                <div style={{fontFamily:"'Shippori Mincho',serif",fontWeight:700,fontSize:15,color:"#6b1a3a"}}>
                  💬 コメント {selected.replyCount>0&&<span style={{fontSize:13,color:"#c06080",fontWeight:400}}>({selected.replyCount}件)</span>}
                </div>
                <button onClick={()=>openReplies(selected)} style={{background:"transparent",border:"1.5px solid #e8b4c4",borderRadius:50,padding:"5px 14px",fontSize:12,cursor:"pointer",color:"#c06080",fontFamily:"'Noto Serif JP',serif"}}>すべて見る</button>
              </div>
              {replies.length>0&&<div style={{marginBottom:14}}>
                {replies.map(r=><div key={r.id} style={{display:"flex",gap:10,marginBottom:10,alignItems:"flex-start"}}>
                  <Avatar src={r.avatarImg} emoji={r.avatar} size={30}/>
                  <div style={{flex:1,background:"#fdf8fa",borderRadius:12,padding:"8px 12px",border:"1px solid rgba(232,180,196,.2)"}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:3}}>
                      <div style={{display:"flex",alignItems:"baseline",gap:8}}>
                        <span style={{fontFamily:"'Shippori Mincho',serif",fontWeight:700,fontSize:13,color:"#6b1a3a"}}>{r.author}</span>
                        <span style={{fontSize:10,color:"#b08090",fontFamily:"'Noto Serif JP',serif"}}>{fmtDate(r.date)}</span>
                      </div>
                      {user?.name===r.author&&<div style={{display:"flex",gap:4,flexShrink:0}}>
                        <button onClick={()=>{setEditReplyTarget(r);setEditReplyText(r.message);}} style={{background:"transparent",border:"1px solid #e8b4c4",borderRadius:20,padding:"2px 8px",fontSize:11,cursor:"pointer",color:"#c06080",fontFamily:"'Noto Serif JP',serif"}}>✏️ 編集</button>
                        <button onClick={()=>handleReplyDelete(r)} style={{background:"transparent",border:"1px solid #f0b4b4",borderRadius:20,padding:"2px 8px",fontSize:11,cursor:"pointer",color:"#e07070",fontFamily:"'Noto Serif JP',serif"}}>🗑️</button>
                      </div>}
                    </div>
                    {editReplyTarget?.id===r.id
                      ?<div>
                        <textarea className="inp inp-ok" value={editReplyText} onChange={e=>setEditReplyText(e.target.value)} rows={2} style={{border:"1.5px solid #e8728a",resize:"none",marginBottom:6,lineHeight:1.7,fontSize:13}}/>
                        <div style={{display:"flex",gap:6,justifyContent:"flex-end"}}>
                          <button className="btn-s" onClick={()=>{setEditReplyTarget(null);setEditReplyText("");}} style={{padding:"5px 12px",fontSize:12}}>キャンセル</button>
                          <button className="btn-p" onClick={handleReplyEditSave} style={{padding:"5px 14px",fontSize:12}}>💾 保存</button>
                        </div>
                      </div>
                      :<div>
                        {r.message&&<p style={{fontSize:13,color:"#3a1520",lineHeight:1.7,margin:"0 0 6px",fontFamily:"'Noto Serif JP',serif",whiteSpace:"pre-wrap",wordBreak:"break-word"}}>{r.message}</p>}
                        {r.image&&<img src={r.image} style={{maxWidth:"100%",maxHeight:200,borderRadius:10,marginBottom:6,border:"1px solid #f0d8e0",display:"block"}} onClick={e=>{e.stopPropagation();setLightboxImg(r.image);}}/>}
                        <div style={{display:"flex",alignItems:"center",gap:6}}>
                          <button onClick={()=>handleReplyLike(r,selected)} disabled={!user} style={{background:replyLiked.has(r.id)?"linear-gradient(135deg,#fce4ec,#f8bbd9)":"transparent",border:replyLiked.has(r.id)?"none":"1px solid #e8b4c4",borderRadius:50,padding:"3px 12px",fontSize:12,cursor:"pointer",color:"#c05070",display:"inline-flex",alignItems:"center",gap:4,fontFamily:"'Noto Serif JP',serif",transition:"all .2s"}}>{replyLiked.has(r.id)?"🩷":"🤍"} {r.likes||0}</button>
                          {Object.keys(r.likedBy||{}).length>0&&<button onClick={()=>setReplyLikersTarget(r)} style={{background:"transparent",border:"none",fontSize:12,cursor:"pointer",color:"#c0a0b8",fontFamily:"'Noto Serif JP',serif",display:"inline-flex",alignItems:"center",gap:3}}>👥 {Object.keys(r.likedBy||{}).length}人</button>}
                        </div>
                      </div>
                    }
                  </div>
                </div>)}
              </div>}
              <div style={{display:"flex",gap:10,alignItems:"flex-start"}}>
                <Avatar src={user?.avatarImg} emoji={user?.avatar||"🌸"} size={34}/>
                <div style={{flex:1}}>
                  <textarea className="inp inp-ok" value={replyText} onChange={e=>setReplyText(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&(e.metaKey||e.ctrlKey))handleReplySubmit();}} rows={2} placeholder="コメントを書く… (Cmd+Enterで送信)" style={{border:"1.5px solid #e8b4c4",resize:"none",lineHeight:1.75,marginBottom:8,fontSize:14}}/>
                  {replyImage&&<div style={{position:"relative",marginBottom:8,display:"inline-block"}}>
                    <img src={replyImage} style={{maxWidth:"100%",maxHeight:160,borderRadius:10,border:"1px solid #e8b4c4",display:"block"}}/>
                    <button onClick={()=>setReplyImage(null)} style={{position:"absolute",top:4,right:4,background:"rgba(0,0,0,.5)",border:"none",borderRadius:"50%",width:22,height:22,cursor:"pointer",color:"#fff",fontSize:12,display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
                  </div>}
                  <input ref={replyImgRef} type="file" accept="image/*" style={{display:"none"}} onChange={handleReplyImgUpload}/>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    {user&&<button onClick={()=>replyImgRef.current?.click()} style={{background:"transparent",border:"1.5px solid #e8d4f0",borderRadius:50,padding:"6px 14px",fontSize:13,cursor:"pointer",color:"#9060b0",fontFamily:"'Noto Serif JP',serif",display:"flex",alignItems:"center",gap:5}}>🖼️ 画像</button>}
                    <button className="btn-p" onClick={handleReplySubmit} disabled={replySaving||(!replyText.trim()&&!replyImage)} style={{padding:"9px 22px",fontSize:14,marginLeft:"auto"}}>
                      {replySaving?<span style={{animation:"spin .8s linear infinite",display:"inline-block"}}>🌸</span>:"💬 送信"}
                    </button>
                  </div>
                </div>
              </div>
            </div>
            <div style={{textAlign:"center",marginTop:16,fontSize:12,color:"#9a5070",fontFamily:"'Noto Serif JP',serif",lineHeight:1.7}}>💌 この予祝があなたの心にも届きますように</div>
          </div>
        </div>}

        {/* WRITE */}
        {view==="write"&&<div style={{animation:"fadeUp .35s ease"}}>
          <button className="btn-s" onClick={()=>setView("feed")} style={{marginBottom:20,padding:"10px 22px",fontSize:14}}>← 戻る</button>
          <div style={{background:"#fff",borderRadius:24,padding:"28px 20px",boxShadow:"0 8px 44px rgba(200,100,140,.11)",border:"1px solid rgba(232,180,196,.35)"}}>
            <h2 style={{fontFamily:"'Shippori Mincho',serif",fontWeight:800,fontSize:21,color:"#6b1a3a",textAlign:"center",marginBottom:4}}>予祝メッセージを書く</h2>
            <p style={{textAlign:"center",color:"#9a5070",fontSize:12,fontFamily:"'Noto Serif JP',serif",marginBottom:20,lineHeight:1.8}}>「もう叶った！」として、未来の喜びを今の言葉で✨</p>
            <div style={{display:"flex",alignItems:"center",gap:14,padding:"14px 16px",background:"linear-gradient(135deg,#fdf4f7,#f8f0ff)",borderRadius:16,border:"1px solid rgba(232,180,196,.3)",marginBottom:24}}>
              <Avatar src={user?.avatarImg} emoji={user?.avatar||"🌸"} size={52}/>
              <div style={{flex:1}}>
                <div style={{fontFamily:"'Shippori Mincho',serif",fontWeight:800,fontSize:17,color:"#6b1a3a"}}>{user?.name||"あなた"}</div>
                <div style={{fontSize:11,color:"#b08090",fontFamily:"'Noto Serif JP',serif",marginTop:2}}>この名前・アイコンで投稿されます</div>
              </div>
              <button onClick={()=>setView("mypage")} style={{background:"transparent",border:"1.5px solid #e8b4c4",borderRadius:50,padding:"6px 12px",fontSize:12,cursor:"pointer",color:"#c06080",fontFamily:"'Noto Serif JP',serif",whiteSpace:"nowrap"}}>変更 →</button>
            </div>
            <div style={{marginBottom:18}}>
              <div style={{fontSize:13,color:"#8b4060",marginBottom:8,fontFamily:"'Noto Serif JP',serif"}}>お花を選ぶ</div>
              <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>{FLOWERS.map(f=><button key={f} onClick={()=>setForm(p=>({...p,flower:f}))} style={{fontSize:20,width:38,height:38,border:form.flower===f?"2.5px solid #e8728a":"1.5px solid #e8b4c4",borderRadius:10,background:form.flower===f?"#fce4ec":"#fff",cursor:"pointer",transition:"all .15s",transform:form.flower===f?"scale(1.18)":"scale(1)"}}>{f}</button>)}</div>
            </div>
            {!user&&<Field label="お名前（ニックネーム）" error={errors.author}><input className={`inp ${errors.author?"inp-err":"inp-ok"}`} value={form.author} onChange={e=>setForm(p=>({...p,author:e.target.value}))} placeholder="例：さくら" style={{border:errors.author?"2px solid #e8728a":"1.5px solid #e8b4c4"}}/></Field>}
            <Field label="カテゴリー">
              <select className="inp inp-ok" style={{appearance:"none",cursor:"pointer",border:"1.5px solid #e8b4c4"}} value={form.category} onChange={e=>setForm(p=>({...p,category:e.target.value}))}>
                {categories.map(c=><option key={c}>{c}</option>)}
              </select>
            </Field>
            <Field label={`予祝メッセージ（${form.message.length}文字）`} error={errors.message}>
              <textarea className={`inp ${errors.message?"inp-err":"inp-ok"}`} value={form.message} onChange={e=>setForm(p=>({...p,message:e.target.value}))} rows={5} placeholder={"例：念願のお店をオープンできました！\nお客様の笑顔に囲まれて毎日幸せです✨"} style={{resize:"vertical",lineHeight:1.85,border:errors.message?"2px solid #e8728a":"1.5px solid #e8b4c4"}}/>
            </Field>
            <div style={{background:"linear-gradient(135deg,#fce4ec18,#f8bbd918)",border:"1px solid #f0c8d8",borderRadius:12,padding:"12px 16px",marginBottom:16}}>
              <div style={{fontSize:12,color:"#9a5070",lineHeight:1.75,fontFamily:"'Noto Serif JP',serif"}}>💡 <strong>予祝のコツ：</strong>「〜したい」ではなく<strong>「〜できました！」</strong>と書きましょう。</div>
            </div>
            <div style={{display:"flex",gap:10,justifyContent:"center"}}>
              <button className="btn-s" onClick={()=>setView("feed")} style={{padding:"13px 22px",fontSize:15}}>キャンセル</button>
              <button className="btn-p" onClick={handleSubmit} disabled={saving} style={{padding:"13px 30px",fontSize:15}}>{saving?<span style={{display:"flex",alignItems:"center",gap:7}}><span style={{animation:"spin .8s linear infinite",display:"inline-block"}}>🌸</span>送信中…</span>:"🌸 みんなに届ける"}</button>
            </div>
          </div>
        </div>}

        {/* BOOKMARKS */}
        {view==="bookmarks"&&<div style={{animation:"fadeUp .35s ease"}}>
          <div style={{display:"flex",alignItems:"baseline",gap:10,marginBottom:18}}>
            <div style={{fontFamily:"'Shippori Mincho',serif",fontWeight:800,fontSize:20,color:"#6b1a3a"}}>📌 ブックマーク</div>
            <div style={{fontSize:12,color:"#b08090",fontFamily:"'Noto Serif JP',serif"}}>{savedPosts.length}件</div>
          </div>
          {savedPosts.length===0?<EmptyState msg="まだブックマークがありません" sub="気になる予祝を保存しましょう"/>
          :<div style={{display:"flex",flexDirection:"column",gap:12}}>{savedPosts.map((p,i)=><PostCard key={p.id} post={p} index={i} liked={liked.has(p.id)} bookmarked={bookmarks.has(p.id)} onOpen={()=>{setSelected(p);setView("detail");setReplies([]);loadReplies(p);}} onLike={()=>handleLike(p.id)} onBookmark={()=>handleBookmark(p.id)} isOwner={user?.name===p.author} onEdit={handleEditStart} onDelete={setDeleteTarget} onShowLikers={openLikers} onComment={(post)=>{setSelected(post);setView("detail");setReplies([]);loadReplies(post);}}/>)}</div>}
        </div>}

        {/* MYPAGE */}
        {view==="mypage"&&user&&<div style={{animation:"fadeUp .35s ease"}}>
          <div style={{background:"#fff",borderRadius:22,padding:"26px 20px",boxShadow:"0 4px 28px rgba(200,100,140,.1)",border:"1px solid rgba(232,180,196,.35)",marginBottom:20}}>
            <div style={{display:"flex",alignItems:"center",gap:16,marginBottom:20}}>
              <Avatar src={user.avatarImg} emoji={user.avatar} size={68}/>
              <div>
                <div style={{fontFamily:"'Shippori Mincho',serif",fontWeight:800,fontSize:22,color:"#6b1a3a"}}>{user.name}</div>
                <div style={{fontSize:12,color:"#b08090",marginTop:3,fontFamily:"'Noto Serif JP',serif"}}>参加日：{fmtDate(user.joined)}</div>
              </div>
            </div>
            <div style={{background:"linear-gradient(135deg,#fdf4f7,#f8f0ff)",borderRadius:16,padding:"18px",marginBottom:20,border:"1px solid rgba(232,180,196,.3)"}}>
              <div style={{fontFamily:"'Shippori Mincho',serif",fontWeight:700,fontSize:14,color:"#6b1a3a",marginBottom:14}}>🖼️ アイコンを変更する</div>
              <div style={{marginBottom:14}}>
                <input ref={imgInputRef} type="file" accept="image/*" style={{display:"none"}} onChange={e=>handleImgUpload(e,"profile")}/>
                <button onClick={()=>imgInputRef.current?.click()} style={{width:"100%",padding:"12px",background:"linear-gradient(135deg,#e8728a,#c85a8e)",color:"#fff",border:"none",borderRadius:12,fontSize:14,cursor:"pointer",fontFamily:"'Noto Serif JP',serif",display:"flex",alignItems:"center",justifyContent:"center",gap:8,boxShadow:"0 4px 14px rgba(200,90,142,.3)"}}>📷 写真をアップロード</button>
                {user.avatarImg&&<button onClick={()=>{const u={...user,avatarImg:"",avatar:user.avatar||"🌸"};lsSet(KEY_USER,u);setUser(u);showToast("写真を削除しました");}} style={{width:"100%",padding:"10px",background:"transparent",border:"1.5px solid #f0b4b4",borderRadius:12,fontSize:13,cursor:"pointer",color:"#e07070",fontFamily:"'Noto Serif JP',serif",marginTop:8}}>🗑️ 写真を削除する</button>}
              </div>
              <div>
                <div style={{fontSize:12,color:"#8b4060",marginBottom:8,fontFamily:"'Noto Serif JP',serif"}}>または絵文字を選ぶ</div>
                <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                  {AVATARS.map(a=><button key={a} onClick={()=>{const u={...user,avatar:a};lsSet(KEY_USER,u);setUser(u);showToast(`絵文字アイコンを${a}に設定しました！`);}} style={{fontSize:20,width:38,height:38,border:user.avatar===a?"2.5px solid #e8728a":"1.5px solid #e8b4c4",borderRadius:10,background:user.avatar===a?"#fce4ec":"#fff",cursor:"pointer",transition:"all .15s",transform:user.avatar===a?"scale(1.18)":"scale(1)"}}>{a}</button>)}
                </div>
              </div>
            </div>
            <div style={{display:"flex"}}>
              {[{label:"投稿",val:myPosts.length},{label:"もらった共感",val:myPosts.reduce((s,p)=>s+p.likes,0)},{label:"保存",val:savedPosts.length}].map((s,i)=><div key={s.label} style={{flex:1,textAlign:"center",borderRight:i<2?"1px solid #f0d8e0":"none"}}><div style={{fontFamily:"'Shippori Mincho',serif",fontWeight:800,fontSize:24,color:"#c85a8e"}}>{s.val}</div><div style={{fontSize:11,color:"#b08090",fontFamily:"'Noto Serif JP',serif"}}>{s.label}</div></div>)}

          <div style={{display:"flex",alignItems:"baseline",gap:10,marginBottom:14}}>
            <div style={{fontFamily:"'Shippori Mincho',serif",fontWeight:800,fontSize:18,color:"#6b1a3a"}}>🌸 わたしの予祝</div>
            <div style={{fontSize:12,color:"#b08090",fontFamily:"'Noto Serif JP',serif"}}>{myPosts.length}件</div>
          </div>
          {myPosts.length===0?<EmptyState msg="まだ投稿がありません" sub="最初の予祝を書いてみましょう" onWrite={()=>setView("write")}/>
          :<div style={{display:"flex",flexDirection:"column",gap:12,marginBottom:20}}>{myPosts.map((p,i)=><PostCard key={p.id} post={p} index={i} liked={liked.has(p.id)} bookmarked={bookmarks.has(p.id)} onOpen={()=>{setSelected(p);setView("detail");setReplies([]);loadReplies(p);}} onLike={()=>handleLike(p.id)} onBookmark={()=>handleBookmark(p.id)} isOwner={true} onEdit={handleEditStart} onDelete={setDeleteTarget} onShowLikers={openLikers} onComment={(post)=>{setSelected(post);setView("detail");setReplies([]);loadReplies(post);}}/>)}</div>}
          <div style={{textAlign:"center",marginTop:8,display:"flex",flexDirection:"column",gap:10,alignItems:"center"}}>
            <button onClick={()=>{lsSet(KEY_USER,null);setUser(null);setOnboard({name:"",avatar:"🌸",avatarImg:""});setView("onboard");}} style={{background:"transparent",border:"none",color:"#c0a0b0",fontSize:13,fontFamily:"'Noto Serif JP',serif",cursor:"pointer"}}>✏️ ニックネームを変更する</button>
            <button onClick={()=>{lsSet(KEY_USER,null);setUser(null);setOnboard({name:"",avatar:"🌸",avatarImg:""});setView("feed");showToast("ログアウトしました");}} style={{background:"transparent",border:"1.5px solid #f0b4b4",borderRadius:50,padding:"10px 28px",color:"#e07070",fontSize:14,fontFamily:"'Noto Serif JP',serif",cursor:"pointer",display:"flex",alignItems:"center",gap:6}}>🚪 ログアウト</button>
          </div>
        </div>}

        {/* ABOUT */}
        {view==="about"&&<div style={{animation:"fadeUp .35s ease"}}>
          <div style={{background:"#fff",borderRadius:24,padding:"34px 22px",boxShadow:"0 8px 40px rgba(200,100,140,.11)",border:"1px solid rgba(232,180,196,.35)"}}>
            <div style={{textAlign:"center",marginBottom:28}}><div style={{fontSize:48,marginBottom:12}}>🌸</div><h2 style={{fontFamily:"'Shippori Mincho',serif",fontWeight:800,fontSize:22,color:"#6b1a3a",margin:0}}>予祝（よしゅく）とは？</h2></div>
            {[{icon:"🎉",t:"先に祝ってしまう",b:"予祝とは「予め祝う」こと。夢や目標がまだ叶っていなくても、すでに叶ったとして先に喜び祝う、日本古来の風習です。"},{icon:"🌱",t:"引き寄せの力",b:"「できました！」と完了形で書くことで、脳がその体験をリアルに感じ、無意識に行動や思考がその方向へ向かっていきます。"},{icon:"👩‍👧‍👦",t:"仲間と共有する",b:"予祝をコミュニティで共有することで、互いの夢を応援し合い、喜びのエネルギーが循環します。"},{icon:"✍️",t:"書き方のコツ",b:"「〜したい」ではなく「〜できました！」と書きます。感情を込めて、できるだけ具体的に。未来の自分になりきって。"}].map(s=><div key={s.t} style={{marginBottom:20,display:"flex",gap:14}}><div style={{fontSize:24,flexShrink:0,marginTop:2}}>{s.icon}</div><div><div style={{fontFamily:"'Shippori Mincho',serif",fontWeight:700,fontSize:15,color:"#6b1a3a",marginBottom:5}}>{s.t}</div><div style={{fontSize:13,color:"#5a3040",lineHeight:1.85,fontFamily:"'Noto Serif JP',serif"}}>{s.b}</div></div></div>)}
            <div style={{textAlign:"center",marginTop:28}}><button className="btn-p" onClick={()=>setView("write")} style={{padding:"13px 32px",fontSize:15}}>✨ さっそく書いてみる</button></div>
          </div>
        </div>}

        {/* ══ ADMIN PAGE ══ */}
        {view==="admin"&&<div style={{animation:"fadeUp .35s ease"}}>
          {!isAdmin&&<div style={{background:"#fff",borderRadius:24,padding:"36px 24px",boxShadow:"0 8px 40px rgba(200,100,140,.11)",border:"1px solid rgba(232,180,196,.35)",maxWidth:400,margin:"0 auto",textAlign:"center"}}>
            <div style={{fontSize:44,marginBottom:14}}>🔑</div>
            <h2 style={{fontFamily:"'Shippori Mincho',serif",fontWeight:800,fontSize:20,color:"#6b1a3a",marginBottom:8}}>管理者ページ</h2>
            <p style={{fontSize:13,color:"#9a5070",fontFamily:"'Noto Serif JP',serif",marginBottom:24,lineHeight:1.7}}>管理者パスワードを入力してください</p>
            <input className={`inp ${adminPwError?"inp-err":"inp-ok"}`} type="password" value={adminPwInput} onChange={e=>{setAdminPwInput(e.target.value);setAdminPwError(false);}} onKeyDown={e=>e.key==="Enter"&&handleAdminLogin()} placeholder="パスワード" style={{marginBottom:12,border:adminPwError?"2px solid #e8728a":"1.5px solid #e8b4c4",textAlign:"center",letterSpacing:".15em"}}/>
            {adminPwError&&<div style={{color:"#e8728a",fontSize:12,marginBottom:10,fontFamily:"'Noto Serif JP',serif"}}>パスワードが違います</div>}
            <button className="btn-p" onClick={handleAdminLogin} style={{width:"100%",padding:"14px",fontSize:15}}>ログイン</button>
          </div>}

          {isAdmin&&<div>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20}}>
              <div style={{fontFamily:"'Shippori Mincho',serif",fontWeight:800,fontSize:20,color:"#6b1a3a"}}>⚙️ 管理者メニュー</div>
              <button onClick={()=>{setIsAdmin(false);setView("feed");}} style={{background:"transparent",border:"1.5px solid #e8b4c4",borderRadius:50,padding:"6px 14px",fontSize:12,cursor:"pointer",color:"#c06080",fontFamily:"'Noto Serif JP',serif"}}>ログアウト</button>
            </div>

            {/* ★★★ メール通知設定カード ★★★ */}
            <div style={{background:"#fff",borderRadius:22,padding:"24px 20px",boxShadow:"0 4px 28px rgba(200,100,140,.1)",border:"1px solid rgba(232,180,196,.35)",marginBottom:16}}>
              <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:4}}>
                <div style={{fontFamily:"'Shippori Mincho',serif",fontWeight:800,fontSize:17,color:"#6b1a3a"}}>📧 メール通知設定</div>
                {/* ON/OFFトグル */}
                <div onClick={()=>setEmailCfg(p=>({...p,enabled:!p.enabled}))} style={{marginLeft:"auto",width:48,height:26,borderRadius:13,background:emailCfg.enabled?"linear-gradient(135deg,#e8728a,#c85a8e)":"#e0d0d8",cursor:"pointer",position:"relative",transition:"all .2s",boxShadow:emailCfg.enabled?"0 2px 8px rgba(200,90,142,.3)":"none"}}>
                  <div style={{position:"absolute",top:3,left:emailCfg.enabled?24:3,width:20,height:20,borderRadius:"50%",background:"#fff",transition:"all .2s",boxShadow:"0 1px 4px rgba(0,0,0,.15)"}}/>
                </div>
                <span style={{fontSize:12,color:emailCfg.enabled?"#e8728a":"#b0a0a8",fontFamily:"'Noto Serif JP',serif"}}>{emailCfg.enabled?"ON":"OFF"}</span>
              </div>
              <div style={{fontSize:12,color:"#9a5070",fontFamily:"'Noto Serif JP',serif",marginBottom:20,lineHeight:1.65}}>
                新しい予祝が投稿された時に管理者へメールで通知します。<br/>
                <a href="https://www.emailjs.com/" target="_blank" style={{color:"#e8728a"}}>EmailJS</a>（無料）を使います。下記の手順で設定してください。
              </div>

              {/* 設定ガイド */}
              <div style={{background:"#fff8f0",border:"1px solid #f0d8a0",borderRadius:12,padding:"14px 16px",marginBottom:20}}>
                <div style={{fontFamily:"'Shippori Mincho',serif",fontWeight:700,fontSize:13,color:"#8a6020",marginBottom:8}}>📋 EmailJS設定手順</div>
                <ol style={{fontSize:12,color:"#6a5020",lineHeight:1.9,fontFamily:"'Noto Serif JP',serif",paddingLeft:18}}>
                  <li><a href="https://www.emailjs.com/" target="_blank" style={{color:"#e8728a"}}>emailjs.com</a> でアカウントを作成</li>
                  <li>「Email Services」でGmailなどを追加 → <strong>Service ID</strong> をコピー</li>
                  <li>「Email Templates」でテンプレートを作成<br/>
                    <span style={{fontSize:11,color:"#9a8050"}}>使える変数：{"{{author}}"} {"{{category}}"} {"{{message}}"} {"{{date}}"} {"{{site_url}}"}</span>
                  </li>
                  <li>テンプレートの <strong>Template ID</strong> をコピー</li>
                  <li>「Account」→「Public Key」をコピー</li>
                </ol>
              </div>

              {/* 入力フォーム */}
              <Field label="管理者メールアドレス（通知先）">
                <input className="inp inp-ok" type="email" value={emailCfg.adminEmail} onChange={e=>setEmailCfg(p=>({...p,adminEmail:e.target.value}))} placeholder="your@email.com" style={{border:"1.5px solid #e8b4c4"}}/>
              </Field>
              <Field label="EmailJS Service ID">
                <input className="inp inp-ok" value={emailCfg.serviceId} onChange={e=>setEmailCfg(p=>({...p,serviceId:e.target.value}))} placeholder="service_xxxxxxx" style={{border:"1.5px solid #e8b4c4",fontFamily:"monospace"}}/>
              </Field>
              <Field label="EmailJS Template ID">
                <input className="inp inp-ok" value={emailCfg.templateId} onChange={e=>setEmailCfg(p=>({...p,templateId:e.target.value}))} placeholder="template_xxxxxxx" style={{border:"1.5px solid #e8b4c4",fontFamily:"monospace"}}/>
              </Field>
              <Field label="EmailJS Public Key">
                <input className="inp inp-ok" value={emailCfg.publicKey} onChange={e=>setEmailCfg(p=>({...p,publicKey:e.target.value}))} placeholder="xxxxxxxxxxxxxxxxxxxxxx" style={{border:"1.5px solid #e8b4c4",fontFamily:"monospace"}}/>
              </Field>

              {/* テスト送信結果 */}
              {emailTestResult==="ok"&&<div style={{background:"#e8f8ee",border:"1px solid #80d090",borderRadius:10,padding:"10px 14px",marginBottom:12,fontSize:13,color:"#287040",fontFamily:"'Noto Serif JP',serif"}}>✅ テストメールを送信しました！受信箱を確認してください。</div>}
              {emailTestResult==="err"&&<div style={{background:"#fff0f0",border:"1px solid #f0b0b0",borderRadius:10,padding:"10px 14px",marginBottom:12,fontSize:13,color:"#c03030",fontFamily:"'Noto Serif JP',serif"}}>❌ 送信失敗。設定値を確認してください。ブラウザのコンソールにエラー詳細があります。</div>}

              <div style={{display:"flex",gap:10,justifyContent:"flex-end",flexWrap:"wrap"}}>
                <button onClick={handleEmailTest}
                  disabled={!emailCfg.serviceId||!emailCfg.templateId||!emailCfg.publicKey||!emailCfg.adminEmail}
                  style={{background:"transparent",border:"1.5px solid #e8b4c4",borderRadius:50,padding:"10px 18px",fontSize:13,cursor:"pointer",color:"#c06080",fontFamily:"'Noto Serif JP',serif",display:"flex",alignItems:"center",gap:6,opacity:(!emailCfg.serviceId||!emailCfg.templateId||!emailCfg.publicKey||!emailCfg.adminEmail)?0.5:1}}>
                  📨 テスト送信
                </button>
                <button className="btn-p" onClick={handleEmailSave} disabled={emailSaving} style={{padding:"10px 22px",fontSize:14}}>
                  {emailSaving?"保存中…":"💾 設定を保存"}
                </button>
              </div>
            </div>

            {/* カテゴリー管理 */}
            <div style={{background:"#fff",borderRadius:22,padding:"24px 20px",boxShadow:"0 4px 28px rgba(200,100,140,.1)",border:"1px solid rgba(232,180,196,.35)",marginBottom:16}}>
              <div style={{fontFamily:"'Shippori Mincho',serif",fontWeight:800,fontSize:17,color:"#6b1a3a",marginBottom:4}}>📂 カテゴリー管理</div>
              <div style={{fontSize:12,color:"#9a5070",fontFamily:"'Noto Serif JP',serif",marginBottom:18,lineHeight:1.6}}>カテゴリーの追加・削除・並び替えができます。変更はリアルタイムで全ユーザーに反映されます。</div>
              <div style={{marginBottom:18}}>
                {categories.map((cat,i)=><div key={cat} style={{display:"flex",alignItems:"center",gap:8,padding:"10px 14px",background:"#fdf8fa",borderRadius:12,marginBottom:8,border:"1px solid rgba(232,180,196,.25)"}}>
                  <span style={{flex:1,fontFamily:"'Noto Serif JP',serif",fontSize:14,color:"#3a1520"}}>{cat}</span>
                  <div style={{display:"flex",gap:4}}>
                    <button onClick={()=>handleCatUp(i)} disabled={i===0} style={{background:"transparent",border:"1px solid #e8b4c4",borderRadius:8,padding:"4px 8px",fontSize:12,cursor:i===0?"default":"pointer",color:i===0?"#d4c0c8":"#c06080",opacity:i===0?0.4:1}}>↑</button>
                    <button onClick={()=>handleCatDown(i)} disabled={i===categories.length-1} style={{background:"transparent",border:"1px solid #e8b4c4",borderRadius:8,padding:"4px 8px",fontSize:12,cursor:i===categories.length-1?"default":"pointer",color:i===categories.length-1?"#d4c0c8":"#c06080",opacity:i===categories.length-1?0.4:1}}>↓</button>
                    <button onClick={()=>handleCatDelete(cat)} style={{background:"transparent",border:"1px solid #f0b4b4",borderRadius:8,padding:"4px 8px",fontSize:12,cursor:"pointer",color:"#e07070"}}>🗑️</button>
                  </div>
                </div>)}
              </div>
              <div style={{borderTop:"1px solid #f0d8e0",paddingTop:16,marginBottom:12}}>
                <div style={{fontSize:13,color:"#8b4060",marginBottom:8,fontFamily:"'Noto Serif JP',serif"}}>新しいカテゴリーを追加</div>
                <div style={{display:"flex",gap:8}}>
                  <input className="inp inp-ok" value={catInput} onChange={e=>setCatInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handleCatAdd()} placeholder="例：趣味・遊び" style={{flex:1,border:"1.5px solid #e8b4c4"}}/>
                  <button className="btn-p" onClick={handleCatAdd} disabled={!catInput.trim()||categories.includes(catInput.trim())} style={{padding:"12px 18px",fontSize:14,whiteSpace:"nowrap"}}>追加</button>
                </div>
                {catInput.trim()&&categories.includes(catInput.trim())&&<div style={{fontSize:12,color:"#e8728a",marginTop:6,fontFamily:"'Noto Serif JP',serif"}}>すでに同じカテゴリーがあります</div>}
              </div>
              <div style={{textAlign:"right"}}><button onClick={handleCatReset} style={{background:"transparent",border:"none",fontSize:12,color:"#c0a0b0",cursor:"pointer",fontFamily:"'Noto Serif JP',serif",textDecoration:"underline"}}>デフォルトに戻す</button></div>
            </div>

            {/* パスワード変更 */}
            <div style={{background:"#fff",borderRadius:22,padding:"24px 20px",boxShadow:"0 4px 28px rgba(200,100,140,.1)",border:"1px solid rgba(232,180,196,.35)",marginBottom:16}}>
              <div style={{fontFamily:"'Shippori Mincho',serif",fontWeight:800,fontSize:17,color:"#6b1a3a",marginBottom:4}}>🔑 管理者パスワード変更</div>
              <div style={{fontSize:12,color:"#9a5070",fontFamily:"'Noto Serif JP',serif",marginBottom:18,lineHeight:1.6}}>新しいパスワードを設定します。このデバイスに保存されます。</div>
              <Field label="新しいパスワード（4文字以上）"><input className="inp inp-ok" type="password" value={newPw} onChange={e=>{setNewPw(e.target.value);setPwChangeError("");}} placeholder="新しいパスワードを入力" style={{border:pwChangeError?"2px solid #e8728a":"1.5px solid #e8b4c4",letterSpacing:".1em"}}/></Field>
              <Field label="新しいパスワード（確認）"><input className="inp inp-ok" type="password" value={newPwConfirm} onChange={e=>{setNewPwConfirm(e.target.value);setPwChangeError("");}} onKeyDown={e=>e.key==="Enter"&&handlePwChange()} placeholder="もう一度入力" style={{border:pwChangeError?"2px solid #e8728a":"1.5px solid #e8b4c4",letterSpacing:".1em"}}/></Field>
              {pwChangeError&&<div style={{color:"#e8728a",fontSize:12,marginBottom:10,fontFamily:"'Noto Serif JP',serif"}}>{pwChangeError}</div>}
              {pwChangeSuccess&&<div style={{color:"#4caf84",fontSize:12,marginBottom:10,fontFamily:"'Noto Serif JP',serif"}}>✅ パスワードを変更しました！</div>}
              <div style={{display:"flex",justifyContent:"flex-end"}}><button className="btn-p" onClick={handlePwChange} disabled={!newPw||!newPwConfirm} style={{padding:"11px 24px",fontSize:14}}>🔑 変更する</button></div>
              <div style={{marginTop:14,padding:"10px 14px",background:"#fff8f0",borderRadius:10,border:"1px solid #f0d8a0"}}>
                <div style={{fontSize:11,color:"#8a6020",fontFamily:"'Noto Serif JP',serif",lineHeight:1.7}}>⚠️ 現在のパスワード：<strong style={{letterSpacing:".1em"}}>{adminPassword}</strong></div>
              </div>
            </div>

            {/* 統計 */}
            <div style={{background:"#fff",borderRadius:22,padding:"24px 20px",boxShadow:"0 4px 28px rgba(200,100,140,.1)",border:"1px solid rgba(232,180,196,.35)"}}>
              <div style={{fontFamily:"'Shippori Mincho',serif",fontWeight:800,fontSize:17,color:"#6b1a3a",marginBottom:16}}>📊 コミュニティ統計</div>
              <div style={{display:"flex",gap:0}}>
                {[{label:"総投稿数",val:posts.length},{label:"総共感数",val:posts.reduce((s,p)=>s+p.likes,0)},{label:"カテゴリー数",val:categories.length}].map((s,i)=><div key={s.label} style={{flex:1,textAlign:"center",borderRight:i<2?"1px solid #f0d8e0":"none"}}>
                  <div style={{fontFamily:"'Shippori Mincho',serif",fontWeight:800,fontSize:26,color:"#c85a8e"}}>{s.val}</div>
                  <div style={{fontSize:11,color:"#b08090",fontFamily:"'Noto Serif JP',serif"}}>{s.label}</div>
                </div>)}
              </div>
            </div>
          </div>}
        </div>}
      </main>

      {/* 返信モーダル */}
      {replyTarget&&<ModalBg onClose={()=>setReplyTarget(null)}>
        <div style={{fontFamily:"'Shippori Mincho',serif",fontWeight:800,fontSize:18,color:"#6b1a3a",marginBottom:4,textAlign:"center"}}>💬 返信・コメント</div>
        <div style={{fontSize:13,color:"#9a5070",textAlign:"center",marginBottom:20,fontFamily:"'Noto Serif JP',serif"}}>{replyTarget.author}さんの予祝へ</div>
        <div style={{maxHeight:280,overflowY:"auto",marginBottom:16}}>
          {replies.length===0?<div style={{textAlign:"center",padding:"24px 0",color:"#c0a0b0",fontFamily:"'Noto Serif JP',serif",fontSize:13}}>まだ返信がありません<br/>最初のコメントを書いてみましょう🌸</div>
          :replies.map(r=><div key={r.id} style={{background:"#fdf8fa",borderRadius:14,padding:"12px 14px",marginBottom:10,border:"1px solid rgba(232,180,196,.2)"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
              <div style={{display:"flex",alignItems:"center",gap:7}}>
                <Avatar src={r.avatarImg} emoji={r.avatar} size={28}/>
                <div><div style={{fontFamily:"'Shippori Mincho',serif",fontWeight:700,fontSize:13,color:"#6b1a3a"}}>{r.author}</div><div style={{fontSize:10,color:"#b08090",fontFamily:"'Noto Serif JP',serif"}}>{fmtDate(r.date)}</div></div>
              </div>
              {user?.name===r.author&&<div style={{display:"flex",gap:5}}>
                <button onClick={()=>{setEditReplyTarget(r);setEditReplyText(r.message);}} style={{background:"transparent",border:"1px solid #e8b4c4",borderRadius:20,padding:"2px 8px",fontSize:11,cursor:"pointer",color:"#c06080"}}>✏️</button>
                <button onClick={()=>handleReplyDelete(r)} style={{background:"transparent",border:"1px solid #f0b4b4",borderRadius:20,padding:"2px 8px",fontSize:11,cursor:"pointer",color:"#e07070"}}>🗑️</button>
              </div>}
            </div>
            {editReplyTarget?.id===r.id
              ?<div><textarea className="inp inp-ok" value={editReplyText} onChange={e=>setEditReplyText(e.target.value)} rows={2} style={{border:"1.5px solid #e8b4c4",resize:"none",marginBottom:8,lineHeight:1.7}}/><div style={{display:"flex",gap:6,justifyContent:"flex-end"}}><button className="btn-s" onClick={()=>setEditReplyTarget(null)} style={{padding:"6px 14px",fontSize:12}}>キャンセル</button><button className="btn-p" onClick={handleReplyEditSave} style={{padding:"6px 14px",fontSize:12}}>保存</button></div></div>
              :<div>
                {r.message&&<p style={{fontSize:13,color:"#3a1520",lineHeight:1.75,margin:"0 0 6px",fontFamily:"'Noto Serif JP',serif",whiteSpace:"pre-wrap",wordBreak:"break-word"}}>{r.message}</p>}
                {r.image&&<img src={r.image} style={{maxWidth:"100%",maxHeight:200,borderRadius:10,marginBottom:6,border:"1px solid #f0d8e0",display:"block",cursor:"pointer"}} onClick={()=>setLightboxImg(r.image)}/>}
                <div style={{display:"flex",alignItems:"center",gap:6}}>
                  <button onClick={()=>handleReplyLike(r,replyTarget||selected)} disabled={!user} style={{background:replyLiked.has(r.id)?"linear-gradient(135deg,#fce4ec,#f8bbd9)":"transparent",border:replyLiked.has(r.id)?"none":"1px solid #e8b4c4",borderRadius:50,padding:"3px 12px",fontSize:12,cursor:"pointer",color:"#c05070",display:"inline-flex",alignItems:"center",gap:4,fontFamily:"'Noto Serif JP',serif",transition:"all .2s"}}>{replyLiked.has(r.id)?"🩷":"🤍"} {r.likes||0}</button>
                  {Object.keys(r.likedBy||{}).length>0&&<button onClick={()=>setReplyLikersTarget(r)} style={{background:"transparent",border:"none",fontSize:12,cursor:"pointer",color:"#c0a0b8",fontFamily:"'Noto Serif JP',serif",display:"inline-flex",alignItems:"center",gap:3}}>👥 {Object.keys(r.likedBy||{}).length}人</button>}
                </div>
              </div>
            }
          </div>)}
        </div>
        <div style={{borderTop:"1px solid #f0d8e0",paddingTop:14}}>
          <textarea className="inp inp-ok" value={replyText} onChange={e=>setReplyText(e.target.value)} rows={3} placeholder="コメントを書く…" style={{border:"1.5px solid #e8b4c4",resize:"none",lineHeight:1.75,marginBottom:8}}/>
          {replyImage&&<div style={{position:"relative",marginBottom:8,display:"inline-block"}}>
            <img src={replyImage} style={{maxWidth:"100%",maxHeight:140,borderRadius:10,border:"1px solid #e8b4c4",display:"block"}}/>
            <button onClick={()=>setReplyImage(null)} style={{position:"absolute",top:4,right:4,background:"rgba(0,0,0,.5)",border:"none",borderRadius:"50%",width:22,height:22,cursor:"pointer",color:"#fff",fontSize:12,display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
          </div>}
          <div style={{display:"flex",gap:8,justifyContent:"space-between",alignItems:"center"}}>
            {user&&<button onClick={()=>replyImgRef.current?.click()} style={{background:"transparent",border:"1.5px solid #e8d4f0",borderRadius:50,padding:"8px 14px",fontSize:13,cursor:"pointer",color:"#9060b0",fontFamily:"'Noto Serif JP',serif",display:"flex",alignItems:"center",gap:5}}>🖼️ 画像</button>}
            <div style={{display:"flex",gap:8}}>
              <button className="btn-s" onClick={()=>setReplyTarget(null)} style={{padding:"10px 18px",fontSize:14}}>閉じる</button>
              <button className="btn-p" onClick={handleReplySubmit} disabled={replySaving||(!replyText.trim()&&!replyImage)} style={{padding:"10px 22px",fontSize:14}}>{replySaving?"送信中…":"💬 送信"}</button>
            </div>
          </div>
        </div>
      </ModalBg>}

      {/* 共感した人モーダル */}
      {likersPost&&<ModalBg onClose={()=>{setLikersPost(null);setLikersData({});}}>
        <div style={{fontFamily:"'Shippori Mincho',serif",fontWeight:800,fontSize:18,color:"#6b1a3a",marginBottom:4,textAlign:"center"}}>🩷 共感した人</div>
        <div style={{fontSize:13,color:"#9a5070",textAlign:"center",marginBottom:20,fontFamily:"'Noto Serif JP',serif"}}>{Object.keys(likersData).length}人が共感しています</div>
        {Object.keys(likersData).length===0?<div style={{textAlign:"center",padding:"24px 0",color:"#c0a0b0",fontFamily:"'Noto Serif JP',serif",fontSize:13}}>まだ共感した人がいません</div>
        :<div style={{display:"flex",flexWrap:"wrap",gap:10,justifyContent:"center",maxHeight:300,overflowY:"auto"}}>
          {Object.entries(likersData).map(([key,val])=><div key={key} style={{display:"flex",alignItems:"center",gap:6,background:"linear-gradient(135deg,#fce4ec,#f8bbd9)",borderRadius:50,padding:"10px 18px",boxShadow:"0 2px 8px rgba(200,90,140,.1)"}}>
            <span style={{fontSize:18}}>🩷</span><span style={{fontFamily:"'Shippori Mincho',serif",fontWeight:700,fontSize:15,color:"#6b1a3a"}}>{typeof val==="string"?val:key}</span>
          </div>)}
        </div>}
        <div style={{textAlign:"center",marginTop:20}}><button className="btn-s" onClick={()=>{setLikersPost(null);setLikersData({});}} style={{padding:"10px 24px",fontSize:14}}>閉じる</button></div>
      </ModalBg>}

      {/* 編集モーダル */}
      {editTarget&&<ModalBg onClose={()=>setEditTarget(null)}>
        <div style={{fontFamily:"'Shippori Mincho',serif",fontWeight:800,fontSize:18,color:"#6b1a3a",marginBottom:20,textAlign:"center"}}>✏️ 予祝を編集する</div>
        <div style={{marginBottom:14}}>
          <div style={{fontSize:13,color:"#8b4060",marginBottom:8,fontFamily:"'Noto Serif JP',serif"}}>お花</div>
          <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>{FLOWERS.map(f=><button key={f} onClick={()=>setEditForm(p=>({...p,flower:f}))} style={{fontSize:19,width:36,height:36,border:editForm.flower===f?"2.5px solid #e8728a":"1.5px solid #e8b4c4",borderRadius:10,background:editForm.flower===f?"#fce4ec":"#fff",cursor:"pointer",transition:"all .15s",transform:editForm.flower===f?"scale(1.15)":"scale(1)"}}>{f}</button>)}</div>
        </div>
        <div style={{marginBottom:14}}>
          <div style={{fontSize:13,color:"#8b4060",marginBottom:7,fontFamily:"'Noto Serif JP',serif"}}>カテゴリー</div>
          <select className="inp inp-ok" style={{border:"1.5px solid #e8b4c4",appearance:"none"}} value={editForm.category} onChange={e=>setEditForm(p=>({...p,category:e.target.value}))}>{categories.map(c=><option key={c}>{c}</option>)}</select>
        </div>
        <div style={{marginBottom:22}}>
          <div style={{fontSize:13,color:"#8b4060",marginBottom:7,fontFamily:"'Noto Serif JP',serif"}}>メッセージ（{editForm.message.length}文字）</div>
          <textarea className="inp inp-ok" value={editForm.message} onChange={e=>setEditForm(p=>({...p,message:e.target.value}))} rows={5} style={{border:"1.5px solid #e8b4c4",resize:"vertical",lineHeight:1.85}}/>
        </div>
        <div style={{display:"flex",gap:10,justifyContent:"center"}}>
          <button className="btn-s" onClick={()=>setEditTarget(null)} style={{padding:"12px 22px",fontSize:14}}>キャンセル</button>
          <button className="btn-p" onClick={handleEditSave} disabled={editForm.message.trim().length<10} style={{padding:"12px 28px",fontSize:14}}>💾 保存する</button>
        </div>
      </ModalBg>}

      {/* 削除確認モーダル */}
      {deleteTarget&&<ModalBg onClose={()=>setDeleteTarget(null)}>
        <div style={{textAlign:"center"}}>
          <div style={{fontSize:44,marginBottom:14}}>🗑️</div>
          <div style={{fontFamily:"'Shippori Mincho',serif",fontWeight:800,fontSize:18,color:"#6b1a3a",marginBottom:10}}>投稿を削除しますか？</div>
          <div style={{fontSize:13,color:"#9a5070",fontFamily:"'Noto Serif JP',serif",lineHeight:1.75,marginBottom:24}}>この操作は取り消せません。<br/>返信も一緒に削除されます。</div>
          <div style={{display:"flex",gap:10,justifyContent:"center"}}>
            <button className="btn-s" onClick={()=>setDeleteTarget(null)} style={{padding:"12px 22px",fontSize:14}}>キャンセル</button>
            <button onClick={handleDeleteConfirm} style={{background:"linear-gradient(135deg,#e87272,#c85a5a)",color:"#fff",border:"none",borderRadius:50,padding:"12px 28px",fontSize:14,cursor:"pointer",fontFamily:"'Noto Serif JP',serif",boxShadow:"0 6px 20px rgba(200,80,80,.35)"}}>削除する</button>
          </div>
        </div>
      </ModalBg>}

      {/* Lightbox */}
      {lightboxImg&&<div onClick={()=>setLightboxImg(null)} style={{position:"fixed",inset:0,zIndex:400,background:"rgba(0,0,0,.88)",display:"flex",alignItems:"center",justifyContent:"center",padding:16,cursor:"zoom-out"}}>
        <div style={{position:"relative",maxWidth:"100%",maxHeight:"100%"}}>
          <img src={lightboxImg} style={{maxWidth:"min(90vw,700px)",maxHeight:"85vh",borderRadius:12,objectFit:"contain",boxShadow:"0 8px 40px rgba(0,0,0,.5)",display:"block"}} onClick={e=>e.stopPropagation()}/>
          <button onClick={()=>setLightboxImg(null)} style={{position:"absolute",top:-12,right:-12,background:"rgba(255,255,255,.9)",border:"none",borderRadius:"50%",width:36,height:36,fontSize:18,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 2px 8px rgba(0,0,0,.3)"}}>✕</button>
        </div>
      </div>}

      {/* コメント共感した人モーダル */}
      {replyLikersTarget&&<ModalBg onClose={()=>setReplyLikersTarget(null)}>
        <div style={{fontFamily:"'Shippori Mincho',serif",fontWeight:800,fontSize:17,color:"#6b1a3a",marginBottom:4,textAlign:"center"}}>🩷 共感した人</div>
        <div style={{fontSize:12,color:"#9a5070",textAlign:"center",marginBottom:16,fontFamily:"'Noto Serif JP',serif",lineHeight:1.6}}>「{replyLikersTarget.message.slice(0,20)}{replyLikersTarget.message.length>20?"…":""}」</div>
        {Object.keys(replyLikersTarget.likedBy||{}).length===0?<div style={{textAlign:"center",padding:"20px 0",color:"#c0a0b0",fontFamily:"'Noto Serif JP',serif",fontSize:13}}>まだ共感した人がいません🌸</div>
        :<div style={{display:"flex",flexWrap:"wrap",gap:8,justifyContent:"center",maxHeight:260,overflowY:"auto"}}>
          {Object.entries(replyLikersTarget.likedBy||{}).map(([key,val])=>(<div key={key} style={{display:"flex",alignItems:"center",gap:6,background:"linear-gradient(135deg,#fce4ec,#f8bbd9)",borderRadius:50,padding:"8px 16px"}}><span style={{fontSize:15}}>🩷</span><span style={{fontFamily:"'Shippori Mincho',serif",fontWeight:700,fontSize:14,color:"#6b1a3a"}}>{typeof val==="string"?val:key}</span></div>))}
        </div>}
        <div style={{textAlign:"center",marginTop:18}}><button className="btn-s" onClick={()=>setReplyLikersTarget(null)} style={{padding:"10px 24px",fontSize:14}}>閉じる</button></div>
      </ModalBg>}

      {/* ボトムナビ */}
      <nav style={{position:"fixed",bottom:0,left:0,right:0,zIndex:100,background:"rgba(255,248,249,.95)",backdropFilter:"blur(20px)",borderTop:"1px solid rgba(232,180,196,.35)",paddingTop:8,paddingBottom:"max(12px,env(safe-area-inset-bottom))"}}>
        <div style={{maxWidth:680,margin:"0 auto",display:"flex",justifyContent:"space-around",alignItems:"center"}}>
          {[{id:"feed",icon:"🏠",label:"ホーム"},{id:"write",icon:"✨",label:"書く"},{id:"bookmarks",icon:"📌",label:"保存"},{id:"mypage",icon:user?.avatarImg?"img":user?.avatar||"👤",label:"マイページ"},{id:"about",icon:"💡",label:"予祝とは"},{id:"admin",icon:"⚙️",label:"管理者"}].map(n=><div key={n.id} className="nav-it" onClick={()=>setView(n.id)} style={{color:view===n.id?"#c85a8e":"#c0a0b0",position:"relative"}}>
            {n.id==="mypage"&&user?.avatarImg?<img src={user.avatarImg} style={{width:22,height:22,borderRadius:"50%",objectFit:"cover"}}/>:<span style={{fontSize:20}}>{n.icon}</span>}
            <span style={{fontSize:10,letterSpacing:".03em",fontFamily:"'Noto Serif JP',serif",fontWeight:view===n.id?600:400}}>{n.label}</span>
            {n.id==="feed"&&newBadge&&<div style={{position:"absolute",top:4,right:8,width:8,height:8,borderRadius:"50%",background:"#ff6b6b",animation:"pulse 1s ease infinite"}}/>}
          </div>)}
        </div>
      </nav>
    </>}
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
